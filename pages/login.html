<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24K Authentication</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body data-theme="dark">

    <div class="auth-container" id="authBox">

        <!-- ===== LOGIN SIDE ===== -->
        <div class="auth-card login-side">
            <div class="text-center">
                <img src="../assets/img/logo.png" alt="24K Logo">
                <p class="subtitle">Login to Vault</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" placeholder="example@gold.com">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn-gold">Login</button>

                <a href="../pages/index.html" class="btn-outline">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </form>

            <div class="auth-footer">
                <span class="small-text">Don't have an account?</span>
                <button class="toggle-link" onclick="toggleAuth()">Create New Account</button>
            </div>
        </div>

        <!-- ===== REGISTER SIDE ===== -->
        <div class="auth-card register-side">
            <div class="text-center">
                <img src="../assets/img/logo.png" alt="24K Logo">
                <p class="subtitle">Register Identity</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@luster.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" placeholder="+962 7XXXXXXXX">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                    <div class="invalid-feedback">Passwords must match and be at least 8 characters.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-gold">Submit</button>

                <div class="btn-secondary-group">
                    <a href="../pages/index.html" class="btn-outline">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                    <button type="button" class="btn-outline" onclick="toggleAuth()">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </button>
                </div>
            </form>

            <div class="auth-footer"></div>
        </div>

    </div>

    <script src="../assets/js/login.js"></script>
</body>
</html>
